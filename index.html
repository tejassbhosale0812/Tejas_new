<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>

    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="d-flex">

    <!-- Sidebar -->
    <div class="sidebar bg-dark text-white p-3">
        <h3>Admin Panel</h3>
        <ul class="nav flex-column">
            <li class="nav-item"><a href="#" class="nav-link text-white">Dashboard</a></li>
            <li class="nav-item"><a href="#" class="nav-link text-white">Students</a></li>
            <li class="nav-item"><a href="#" class="nav-link text-white">Exams</a></li>
            <li class="nav-item"><a href="#" class="nav-link text-white">Reports</a></li>
        </ul>
    </div>

    <!-- Main Content -->
    <div class="container-fluid p-4">

        <h2>Dashboard</h2>

        <div class="row mt-4">

            <!-- Card 1 -->
            <div class="col-md-3">
                <div class="card text-center p-3 shadow">
                    <h5>Total Students</h5>
                    <h3>1200</h3>
                </div>
            </div>

            <!-- Card 2 -->
            <div class="col-md-3">
                <div class="card text-center p-3 shadow">
                    <h5>Exams</h5>
                    <h3>25</h3>
                </div>
            </div>

            <!-- Card 3 -->
            <div class="col-md-3">
                <div class="card text-center p-3 shadow">
                    <h5>Results</h5>
                    <h3>980</h3>
                </div>
            </div>

            <!-- Card 4 -->
            <div class="col-md-3">
                <div class="card text-center p-3 shadow">
                    <h5>Pending</h5>
                    <h3>50</h3>
                </div>
            </div>

        </div>
    </div>

</div>

</body>
</html>
